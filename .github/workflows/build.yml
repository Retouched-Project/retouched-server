name: Build Server

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # GUI builds (Qt + CLI)
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch_label: x86_64
            qt_arch: linux_gcc_64
            qt_modules: qtwaylandcompositor

          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch_label: aarch64
            qt_arch: linux_gcc_arm64
            qt_host: linux_arm64
            qt_modules: qtwaylandcompositor

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            qt_arch: win64_msvc2022_64

          - name: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            qt_arch: win64_msvc2022_arm64
            qt_host: windows_arm64

          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin

          - name: macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            qt_arch: clang_64

          # CLI-only builds (no Qt)
          - name: linux-x86
            os: ubuntu-24.04
            target: i686-unknown-linux-gnu
            cli_only: true
            cross_packages: gcc-multilib

          - name: linux-arm32
            os: ubuntu-24.04
            target: armv7-unknown-linux-gnueabihf
            cli_only: true
            cross_packages: gcc-arm-linux-gnueabihf
            cross_linker: arm-linux-gnueabihf-gcc

          - name: windows-x86
            os: windows-latest
            target: i686-pc-windows-msvc
            cli_only: true

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout server
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.name }}

      - name: Install cross toolchain
        if: ${{ matrix.cross_packages }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_packages }}

      - name: Set cross linker
        if: ${{ matrix.cross_linker }}
        run: |
          TARGET_UPPER=$(echo "${{ matrix.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${TARGET_UPPER}_LINKER=${{ matrix.cross_linker }}" >> "$GITHUB_ENV"

      - name: Install build dependencies (Linux)
        if: ${{ runner.os == 'Linux' && !matrix.cli_only }}
        run: |
          sudo apt-get update
          
          if [ "${{ matrix.qt_arch }}" = "" ]; then
            sudo apt-get install -y \
              qt6-base-dev qt6-declarative-dev \
              qt6-wayland qt6-wayland-dev qml6-module-qtquick-controls \
              qml6-module-qtquick-layouts qml6-module-qtquick-templates \
              qml6-module-qtqml-workerscript 
          fi
          
          sudo apt-get install -y \
            libgl-dev pkg-config g++ mold patchelf libxkbcommon-dev \
            libvulkan-dev libfontconfig1-dev libfreetype6-dev libx11-dev \
            libxcb1-dev libwayland-dev

          sudo ln -sf /usr/bin/mold /usr/bin/ld.gold

      - name: Install Qt (aqtinstall)
        if: ${{ matrix.qt_arch }}
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: ${{ matrix.qt_host || '' }}
          arch: ${{ matrix.qt_arch }}
          modules: ${{ matrix.qt_modules || '' }}
          install-deps: 'true'

      - name: Install Qt (macOS brew)
        if: ${{ runner.os == 'macOS' && !matrix.cli_only && !matrix.qt_arch }}
        run: |
          brew install qt@6
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - name: Build
        run: >-
          cargo build --release
          --target ${{ matrix.target }}
          ${{ matrix.cli_only && '--no-default-features' || '' }}

      - name: Package (Linux)
        if: ${{ runner.os == 'Linux' && !matrix.cli_only }}
        run: |
          set -euo pipefail
          ARCH=${{ matrix.arch_label }}
          QMAKE=$(which qmake || which qmake6)
          QT_LIB_DIR=$($QMAKE -query QT_INSTALL_LIBS)
          QT_PLUGIN_DIR=$($QMAKE -query QT_INSTALL_PLUGINS)
          QT_QML_DIR=$($QMAKE -query QT_INSTALL_QML)
          OUTPUT="RetouchedServer-${ARCH}.AppImage"

          mkdir -p AppDir/usr/{bin,lib,share/applications,share/icons/hicolor/scalable/apps,plugins,qml}
          cp "target/${{ matrix.target }}/release/retouched-server" AppDir/usr/bin/
          cp packaging/retouched-server.desktop AppDir/usr/share/applications/
          cp assets/retouched_logo.svg AppDir/usr/share/icons/hicolor/scalable/apps/retouched-server.svg
          cp packaging/retouched-server.desktop AppDir/
          ln -sf usr/share/icons/hicolor/scalable/apps/retouched-server.svg AppDir/retouched-server.svg
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          export QT_PLUGIN_PATH="$HERE/usr/plugins"
          export QML2_IMPORT_PATH="$HERE/usr/qml"
          exec "$HERE/usr/bin/retouched-server" "$@"
          APPRUN
          chmod +x AppDir/AppRun
          ln -sf usr/share/icons/hicolor/scalable/apps/retouched-server.svg AppDir/.DirIcon

          cp -an "$QT_LIB_DIR"/libQt6*.so.* AppDir/usr/lib/ 2>/dev/null || true
          cp -an "$QT_LIB_DIR"/libicu*.so.*  AppDir/usr/lib/ 2>/dev/null || true
          for plug in platforms wayland-shell-integration \
                      wayland-decoration-client wayland-graphics-integration-client \
                      platformthemes iconengines imageformats; do
            if [ -d "$QT_PLUGIN_DIR/$plug" ]; then
              mkdir -p "AppDir/usr/plugins/$plug"
              cp -a "$QT_PLUGIN_DIR/$plug/"*.so "AppDir/usr/plugins/$plug/" 2>/dev/null || true
            fi
          done

          for mod in QtQuick QtQml QtQuick/Controls QtQuick/Layouts \
                     QtQuick/Templates QtQuick/Dialogs QtQuick/Window \
                     QtQml/WorkerScript Qt5Compat; do
            if [ -d "$QT_QML_DIR/$mod" ]; then
              mkdir -p "AppDir/usr/qml/$mod"
              cp -a "$QT_QML_DIR/$mod/." "AppDir/usr/qml/$mod/"
            fi
          done

          cat > AppDir/usr/bin/qt.conf << 'QTCONF'
          [Paths]
          Prefix = ..
          Plugins = plugins
          Qml2Imports = qml
          QTCONF

          EXCLUDE='libc\.|libdl\.|librt\.|libm\.|libpthread\.|libutil\.|libresolv\.|libnss_|ld-linux|libBrokenLocale\.|libthread_db\.|libSegFault\.|libanl\.|libmvec\.|libEGL\.|libGL\.|libGLX\.|libGLESv2\.|libGLdispatch\.|libvulkan\.|libdrm\.|libgbm\.|libglapi\.|libOpenGL\.'
          for _pass in 1 2; do
            find AppDir/usr -name '*.so*' -type f 2>/dev/null | while read -r so; do
              LD_LIBRARY_PATH="AppDir/usr/lib" ldd "$so" 2>/dev/null \
                | awk '/=> \// {print $3}' | while read -r dep; do
                base=$(basename "$dep")
                if echo "$base" | grep -qE "$EXCLUDE"; then continue; fi
                [ -f "AppDir/usr/lib/$base" ] || cp -n "$dep" "AppDir/usr/lib/" 2>/dev/null || true
              done
            done
          done
          find AppDir/usr/lib -maxdepth 1 -type f | while read -r f; do
            if echo "$(basename "$f")" | grep -qE "$EXCLUDE"; then rm -f "$f"; fi
          done

          LIB_ABS=$(cd AppDir/usr/lib && pwd)
          find AppDir/usr -name '*.so*' -type f | while read -r so; do
            SO_DIR=$(cd "$(dirname "$so")" && pwd)
            REL=$(python3 -c "import os; print(os.path.relpath('$LIB_ABS', '$SO_DIR'))")
            patchelf --set-rpath "\$ORIGIN/$REL" "$so" 2>/dev/null || true
          done
          patchelf --set-rpath '$ORIGIN/../lib' AppDir/usr/bin/retouched-server

          curl -fsSL -o appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${ARCH}.AppImage"
          chmod +x appimagetool
          ./appimagetool AppDir "$OUTPUT"

          cat > AppDir/usr/run.sh << 'WRAPPER'
          #!/bin/sh
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          export QT_PLUGIN_PATH="$DIR/plugins"
          export QML2_IMPORT_PATH="$DIR/qml"
          exec "$DIR/bin/retouched-server" "$@"
          WRAPPER
          chmod +x AppDir/usr/run.sh
          mv AppDir/usr "RetouchedServer-linux-${ARCH}"

      - name: Package (Windows)
        if: ${{ runner.os == 'Windows' && !matrix.cli_only }}
        shell: pwsh
        run: |
          $binDir = "target/${{ matrix.target }}/release"
          $deployDir = "deploy"
          New-Item -ItemType Directory -Path $deployDir -Force
          Copy-Item "$binDir/retouched-server.exe" $deployDir

          windeployqt6 --qmldir qml --no-translations "$deployDir/retouched-server.exe"

      - name: Package .app and .dmg (macOS)
        if: ${{ runner.os == 'macOS' && !matrix.cli_only }}
        run: |
          APP="RetouchedServer.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          cp "target/${{ matrix.target }}/release/retouched-server" "$APP/Contents/MacOS/"
          cp packaging/Info.plist "$APP/Contents/"
          # Convert PNG icon to icns
          mkdir -p icon.iconset
          sips -z 256 256 assets/retouched_logo_icons.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 assets/retouched_logo_icons.png --out icon.iconset/icon_512x512.png
          sips -z 128 128 assets/retouched_logo_icons.png --out icon.iconset/icon_128x128.png
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/retouched-server.icns"

          macdeployqt "$APP" -qmldir=qml -dmg

          mv RetouchedServer.dmg "RetouchedServer-${{ matrix.name }}.dmg"

      - name: Upload AppImage (Linux)
        if: ${{ runner.os == 'Linux' && !matrix.cli_only }}
        uses: actions/upload-artifact@v4
        with:
          name: retouched-server-${{ matrix.name }}-appimage
          path: RetouchedServer-*.AppImage
          retention-days: 30

      - name: Upload portable (Linux)
        if: ${{ runner.os == 'Linux' && !matrix.cli_only }}
        uses: actions/upload-artifact@v4
        with:
          name: retouched-server-${{ matrix.name }}
          path: RetouchedServer-linux-*
          retention-days: 30

      - name: Upload artifact (Windows)
        if: ${{ runner.os == 'Windows' && !matrix.cli_only }}
        uses: actions/upload-artifact@v4
        with:
          name: retouched-server-${{ matrix.name }}
          path: deploy/
          retention-days: 30

      - name: Upload artifact (macOS)
        if: ${{ runner.os == 'macOS' && !matrix.cli_only }}
        uses: actions/upload-artifact@v4
        with:
          name: retouched-server-${{ matrix.name }}
          path: RetouchedServer-*.dmg
          retention-days: 30

      - name: Upload artifact (CLI)
        if: ${{ matrix.cli_only }}
        uses: actions/upload-artifact@v4
        with:
          name: retouched-server-${{ matrix.name }}-cli
          path: |
            target/${{ matrix.target }}/release/retouched-server
            target/${{ matrix.target }}/release/retouched-server.exe
          retention-days: 30
